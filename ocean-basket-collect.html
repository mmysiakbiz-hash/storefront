<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#faf7f0;--paper2:#f1ece1;--ink:#0a1140;--char:#23262b;--gilt:#1ba8d3;--line:#e4ddcf;--mut:#857f74;
    --ok:#3f7a5a;--ok-bg:#edf3ee;--pink:#b5573a;--pink-bg:#f6ece7;--max:480px;
    --serif:'Bodoni Moda',Didot,Georgia,serif;--sans:'Outfit',-apple-system,sans-serif}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:#0a0a0a;color:var(--char);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{max-width:var(--max);margin:0 auto;min-height:100dvh;background:var(--paper);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.3)}
  .topbar{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:11px}
  .topbar .mark{width:26px;height:26px;border-radius:6px;background:url('./ob-icon-192.png') center/cover, linear-gradient(150deg,var(--gilt),#0f6f8c)}
  .topbar b{font-weight:600;font-size:14.5px}
  .topbar .role{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.28);border-radius:3px;padding:4px 9px}
  .body{padding:22px 18px 30px;flex:1}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--mut);font-weight:600;margin:0 0 10px}
  h1{font-family:var(--serif);font-weight:500;font-size:29px;line-height:1.1;color:var(--ink);margin:2px 0 8px}
  .sub{color:var(--mut);font-size:14px;margin:0 0 20px} .sub b{color:var(--char)}
  label{display:block;font-size:12px;font-weight:600;margin:0 0 6px}
  input{width:100%;font-family:inherit;font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:4px;background:#fff;margin-bottom:14px}
  input:focus{outline:none;border-color:var(--gilt)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ink);color:#fff;font-family:inherit;font-weight:700;font-size:15px;padding:15px 20px;border-radius:4px;border:1px solid var(--ink);cursor:pointer;letter-spacing:.02em}
  .btn:active{transform:translateY(1px)} .btn svg{width:18px;height:18px}
  .btn.sec{background:#fff;color:var(--char);border-color:var(--line);font-weight:600}
  .gate{text-align:center;border:1px solid var(--line);border-radius:8px;padding:22px 18px;background:#fff}
  .gate .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--mut);font-weight:600}
  .gate .big{font-family:var(--serif);font-weight:600;font-size:34px;color:var(--ink);margin:8px 0 4px;word-break:break-all}
  .qrwrap{width:150px;height:150px;margin:14px auto 2px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px}
  .qrwrap svg{width:100%;height:100%}
  .verdict{border-radius:8px;padding:28px 20px;text-align:center;margin-bottom:14px;border:1px solid}
  .verdict.go{background:var(--ok-bg);border-color:var(--ok)} .verdict.stop{background:var(--pink-bg);border-color:var(--pink)}
  .verdict .ico{width:46px;height:46px;margin:0 auto 12px;border-radius:50%;display:grid;place-items:center}
  .verdict.go .ico{background:var(--ok);color:#fff} .verdict.stop .ico{background:var(--pink);color:#fff} .verdict .ico svg{width:24px;height:24px}
  .verdict .head{font-family:var(--serif);font-weight:500;font-size:23px;margin:0 0 6px} .verdict.go .head{color:var(--ok)} .verdict.stop .head{color:var(--pink)}
  .verdict .txt{font-size:14px;color:var(--char);opacity:.9;line-height:1.5}
  .call{margin-top:14px;display:inline-flex;gap:9px;align-items:center;text-decoration:none;background:var(--ink);color:#fff;border-radius:4px;padding:12px 20px;font-weight:700;font-size:15px} .call svg{width:17px;height:17px}
  #scan{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column} #scan.on{display:flex}
  #scan video{flex:1;width:100%;object-fit:cover}
  #scan .frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:66vw;max-width:280px;height:66vw;max-height:280px;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 100vmax rgba(0,0,0,.45)}
  #scan .bar{position:absolute;top:0;left:0;right:0;padding:16px 18px;color:#fff;font-weight:600;display:flex;justify-content:space-between;background:linear-gradient(#000a,transparent)}
  #scan .bar button{background:rgba(255,255,255,.16);border:0;color:#fff;font:600 14px var(--sans);padding:9px 14px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="mark"></span><b>Ocean Basket</b><span class="role">Collect</span></div>
  <div class="body" id="view"></div>
</div>
<div id="scan"><div class="bar"><span>Scan the freezer</span><button id="scanX">Cancel</button></div><video id="scanVid" playsinline></video><div class="frame"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const SUPABASE_URL='https://xhhwyyrbdhxgtcbpvges.supabase.co', SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoaHd5eXJiZGh4Z3RjYnB2Z2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODgwMzMsImV4cCI6MjA5Njk2NDAzM30.wt5VQVCCZHEBAgygBdCWJzCR7bisbAAP_Q5uVFVEADU', STORE='11111111-1111-1111-1111-111111111111';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:false}});
const view=document.getElementById('view');
const I={check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',cross:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>',scan:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M3 12h18"/></svg>'};
function qrSvg(t){var q=qrcode(0,'M');q.addData(t);q.make();return q.createSvgTag({cellSize:4,margin:0});}

let scanStream=null;
function stopScan(){document.getElementById('scan').classList.remove('on');if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}}
function ensureConfirm(){var box=document.getElementById('scan');var c=document.getElementById('scanConfirm');if(c)return c;c=document.createElement('div');c.id='scanConfirm';c.style.cssText='position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.35);display:none';c.innerHTML='<div style="font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#857f74;font-weight:700;margin-bottom:6px">Captured</div><div class="cval" style="font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:#0a1140;word-break:break-all;margin-bottom:14px"></div><div style="display:flex;gap:10px"><button class="credo" style="flex:1;padding:14px;border-radius:6px;border:1px solid #e4ddcf;background:#fff;font:700 15px Outfit,sans-serif;color:#23262b">Scan again</button><button class="cuse" style="flex:1;padding:14px;border-radius:6px;border:0;background:#0a1140;color:#fff;font:700 15px Outfit,sans-serif">Use this</button></div>';box.appendChild(c);return c;}
function scanOnce(){return new Promise(async(resolve)=>{var box=document.getElementById('scan'),vid=document.getElementById('scanVid');var conf=ensureConfirm();conf.style.display='none';var paused=false;document.getElementById('scanX').onclick=()=>{stopScan();resolve(null);};box.classList.add('on');try{scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}catch(e){stopScan();resolve({error:1});return;}vid.srcObject=scanStream;await vid.play();var det=('BarcodeDetector' in window)?new window.BarcodeDetector({formats:['qr_code']}):null;var cv=document.createElement('canvas'),cx=cv.getContext('2d',{willReadFrequently:true});(function tick(){if(!box.classList.contains('on'))return;if(!paused&&vid.readyState===vid.HAVE_ENOUGH_DATA){cv.width=vid.videoWidth;cv.height=vid.videoHeight;cx.drawImage(vid,0,0,cv.width,cv.height);if(det){det.detect(vid).then(cs=>{if(!paused&&cs&&cs.length){capture(cs[0].rawValue);}}).catch(()=>{});}else{var im=cx.getImageData(0,0,cv.width,cv.height);var r=window.jsQR&&jsQR(im.data,cv.width,cv.height);if(r&&r.data){capture(r.data);}}}requestAnimationFrame(tick);})();function capture(text){if(paused)return;paused=true;conf.querySelector('.cval').textContent=text;conf.style.display='block';conf.querySelector('.cuse').onclick=function(){stopScan();resolve({text:text});};conf.querySelector('.credo').onclick=function(){conf.style.display='none';paused=false;};}});}

function screenEnter(){
  var pre=new URLSearchParams(location.search).get('order')||'';
  view.innerHTML='<p class="eyebrow">Collection</p><h1>Find your order</h1><p class="sub">Enter your order number, then scan the freezer and your bag to check you have the right pack.</p><div class="card"><label>Order number</label><input id="ord" placeholder="OCB-..." value="'+pre+'"/><button class="btn" id="go">Continue</button></div>';
  document.getElementById('go').onclick=function(){var o=document.getElementById('ord').value.trim().toUpperCase();if(o)screenScan(o);};
  if(pre) screenScan(pre.trim().toUpperCase());
}
function stepRow(label,val){
  var done=!!val;
  var badge=done
    ? '<span style="width:28px;height:28px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center">'+I.check+'</span>'
    : '<span style="width:28px;height:28px;border-radius:50%;border:1px solid var(--line);color:var(--mut);display:grid;place-items:center;font-size:13px">-</span>';
  return '<div style="display:flex;align-items:center;gap:12px;padding:12px 13px;border:1px solid '+(done?'var(--ok)':'var(--line)')+';border-radius:8px;background:'+(done?'var(--ok-bg)':'#fff')+';margin-bottom:9px">'+
    '<span style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">'+label+'</div><div style="font-size:12px;color:var(--mut);word-break:break-all">'+(val||'not scanned')+'</div></span>'+badge+'</div>';
}
function screenScan(order){
  var got={freezer:null,bag:null};
  var steps=[{k:'freezer',label:'Freezer QR'},{k:'bag',label:'Your bag QR'}];
  render();
  function render(){
    var next=steps.filter(function(s){return !got[s.k];})[0];
    view.innerHTML='<p class="eyebrow">Collection</p><h1>'+order+'</h1>'+
      '<p class="sub">Scan the freezer at your collection point, then your bag sticker - just to check you are taking the right pack.</p>'+
      '<div class="card">'+steps.map(function(s){return stepRow(s.label,got[s.k]);}).join('')+'</div>'+
      (next
        ? '<button class="btn" id="doScan">'+I.scan+' Scan '+next.label+'</button>'
        : '<div class="msg ok">Checking...</div>')+
      '<button class="btn sec" id="back" style="margin-top:10px">Cancel</button>';
    document.getElementById('back').onclick=screenEnter;
    if(next){
      document.getElementById('doScan').onclick=async function(){
        var r=await scanOnce();
        if(!r){return;} if(r.error){alert('Camera not available (needs HTTPS + camera permission).');return;}
        got[next.k]=r.text.trim(); render();
      };
    } else { finish(); }
  }
  async function finish(){
    if(got.bag.toUpperCase()!==order){ return resultBad(order,'that bag is a different order ('+got.bag+')'); }
    var dp=null;
    try{ var res=await sb.rpc('ob_order_status',{p_store:STORE,p_no:order}); if(res&&res.data&&res.data.order){ dp=res.data.order.drop_point_id; } }catch(e){}
    if(dp && got.freezer.toUpperCase()!==String(dp).toUpperCase()){
      return resultBad(order,'this is freezer '+got.freezer+', but your order is at '+dp);
    }
    try{ localStorage.setItem('ob_oriented_'+order, String(Date.now())); }catch(e){}

    // Close the order. Louis approved customer self-scan at freezer points: there is no
    // cashier there, so the customer is the only one who can confirm the handover.
    // We do NOT decide that here. ob_collect checks ob_drop_points.pos_managed and
    // refuses at staffed points, where the cashier confirms on the POS instead. So the
    // same screen is correct at both kinds of point, and re-classifying a point is a
    // flag in the database, not a code change.
    var done=null;
    try{
      var cr=await sb.rpc('ob_collect',{p_store:STORE,p_order:order,p_drop_point:(dp||got.freezer.toUpperCase())});
      done=(cr && cr.data) ? cr.data : null;
    }catch(e){ done=null; }

    if(done && done.ok){ return resultGood(order, true); }

    // Every other outcome is a real state, not a failure of the scan. The pack IS the
    // right one - we checked - so never send the customer away empty-handed: show the
    // QR and tell them what actually needs to happen.
    var why=(done && done.reason) || 'offline';
    if(why==='pos_managed_point'){ return resultGood(order, false, 'staff'); }
    if(why==='not_ready'){ return resultBad(order, 'this order is not ready for collection yet ('+((done&&done.status)||'?')+')'); }
    return resultGood(order, false, 'offline');
  }
}
/**
 * collected = true  -> ob_collect closed the order. Done, they can go.
 * mode 'staff'      -> a staffed point: the cashier completes it on the POS.
 * mode 'offline'    -> we could not reach the server. The checks passed, so the pack is
 *                      theirs; the QR is what staff or the online team can act on.
 */
function resultGood(order, collected, mode){
  var head, txt;
  if(collected){
    head='Collected - enjoy your fish';
    txt='Your order is complete. Keep this code in case anyone asks.';
  } else if(mode==='staff'){
    head='Right freezer, right pack';
    txt='Show this QR to staff to complete your pickup.';
  } else {
    head='Right freezer, right pack';
    txt='We could not confirm it online just now. Take your pack and show this QR to staff, or call the online team.';
  }
  view.innerHTML='<div class="verdict go"><div class="ico">'+I.check+'</div><div class="head">'+head+'</div>'+
    '<div class="txt">'+txt+'</div></div>'+
    '<div class="card" style="text-align:center"><div style="max-width:220px;margin:0 auto">'+qrSvg(order)+'</div><div style="font-family:ui-monospace,monospace;font-weight:700;color:#0a1140;margin-top:10px">'+order+'</div></div>'+
    (collected?'':'<a class="call" href="tel:2666666" style="margin-top:12px">'+I.phone+' 2666666</a>')+
    '<a class="btn" href="ocean-basket-app.html?order='+encodeURIComponent(order)+'" style="display:block;text-align:center;text-decoration:none;margin-top:12px">Back to my order</a>';
}
function resultBad(order,note){
  view.innerHTML='<div class="verdict stop"><div class="ico">'+I.cross+'</div><div class="head">Check again</div><div class="txt">'+order+' - '+note+'. Find the correct freezer, or call the online team.</div><a class="call" href="tel:2666666">'+I.phone+' 2666666</a></div><button class="btn sec" id="again" style="margin-top:14px">Back</button>';
  document.getElementById('again').onclick=screenEnter;
}
screenEnter();
</script>
</body>
</html>
