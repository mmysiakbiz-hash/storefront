<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Ocean Basket — Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400..600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root{--paper:#faf7f0;--paper2:#f1ece1;--ink:#0a1140;--navy:#0a1140;--char:#23262b;--gilt:#1ba8d3;--line:#e4ddcf;--mut:#857f74;
    --ok:#3f7a5a;--ok-bg:#edf3ee;--pink:#b5573a;--pink-bg:#f6ece7;--max:480px;
    --serif:'Bodoni Moda',Didot,Georgia,serif;--sans:'Outfit',-apple-system,sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:#0a0a0a;color:var(--char);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{max-width:var(--max);margin:0 auto;min-height:100dvh;background:var(--paper);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.3)}
  .topbar{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:11px}
  .topbar .mark{width:34px;height:34px;border-radius:8px;background:#fff url('./ob-icon-192.png') center/76% no-repeat;flex:none}
  .topbar b{font-weight:600;font-size:14.5px}
  .topbar .role{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.28);border-radius:3px;padding:4px 9px}
  .ctx{padding:14px 18px 0}
  .ctx #who{font-size:12.5px;color:var(--mut);display:block;word-break:break-word}
  .body{padding:16px 18px 30px;flex:1}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--mut);font-weight:600;margin:0 0 10px}
  h1{font-family:var(--serif);font-weight:500;font-size:29px;line-height:1.1;color:var(--ink);margin:2px 0 8px}
  .sub{color:var(--mut);font-size:14px;margin:0 0 20px}
  label{display:block;font-size:12px;font-weight:600;color:var(--char);margin:12px 0 6px}
  input{width:100%;font-family:inherit;font-size:16px;padding:13px 14px;border:1px solid var(--line);border-radius:4px;background:#fff;margin-bottom:2px}
  input:focus{outline:none;border-color:var(--gilt)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ink);color:#fff;font-family:inherit;font-weight:700;font-size:15px;padding:15px 20px;border-radius:4px;border:1px solid var(--ink);cursor:pointer;letter-spacing:.02em}
  .btn:active{transform:translateY(1px)} .btn:disabled,.btn[disabled]{opacity:.55}
  .btn.sec{background:#fff;color:var(--char);border-color:var(--line);font-weight:600}
  .btn svg{width:18px;height:18px;flex:none}
  .row-actions{display:flex;gap:8px;margin-top:14px}
  .row-actions .btn{padding:12px 10px;font-size:13.5px}
  .msg{font-size:13.5px;padding:12px 14px;border-radius:6px;margin:12px 0 0;line-height:1.5}
  .msg.err{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink)}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:12px}
  .sec-h{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:20px 2px 10px}
  .ord{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:9px}
  .ord .on{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);letter-spacing:.01em}
  .ord .cn{font-size:14px;font-weight:600;color:var(--char);margin-top:3px}
  .ord .it{font-size:12.5px;color:var(--mut);margin-top:6px;line-height:1.5}
  .meta{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
  .pill{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:3px;border:1px solid var(--line)}
  .pill.ready{background:#e9f5fa;color:#0e6a86;border-color:#bfe3f0}
  .pill.collected{background:var(--ok-bg);color:var(--ok);border-color:var(--ok)}
  .pill.otw{background:var(--paper2);color:#8a6d3b;border-color:#e0d3b8}
  .pt{font-size:12px;color:var(--mut)}
  .tm{font-size:12px;color:var(--mut);margin-left:auto}
  .empty{text-align:center;color:var(--mut);font-size:14px;padding:26px 10px}
  .note{font-size:12.5px;color:var(--mut);background:var(--paper2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-top:16px;line-height:1.5}
  .verdict{border-radius:8px;padding:22px 18px;text-align:center;border:1px solid;margin-bottom:12px}
  .shscan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:66vw;max-width:280px;height:66vw;max-height:280px;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 100vmax rgba(0,0,0,.45)}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar"><span class="mark"></span><b>Ocean Basket</b><span class="role">Shop</span></div>
    <div class="ctx"><span id="who">Collection point terminal</span></div>
    <div class="body" id="view"><div class="card">Loading…</div></div>
  </div>

<script>
const SUPABASE_URL='https://xhhwyyrbdhxgtcbpvges.supabase.co', SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoaHd5eXJiZGh4Z3RjYnB2Z2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODgwMzMsImV4cCI6MjA5Njk2NDAzM30.wt5VQVCCZHEBAgygBdCWJzCR7bisbAAP_Q5uVFVEADU', STORE='11111111-1111-1111-1111-111111111111';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{detectSessionInUrl:true,flowType:'implicit',persistSession:true,autoRefreshToken:true}});
const view=document.getElementById('view');
const who=document.getElementById('who');

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function fmtTime(t){ if(!t) return ''; try{ var d=new Date(t); return d.toLocaleString([], {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function svgScan(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M3 12h18"/></svg>'; }

function loginView(msg){
  who.textContent='Collection point terminal';
  view.innerHTML='<div class="card"><label>Email</label><input id="email" type="email" autocomplete="username" placeholder="shop@oceanbasket.sc"/>'
    +'<label>Password</label><input id="pw" type="password" autocomplete="current-password" placeholder="Your password"/>'
    +'<button class="btn" id="login" style="margin-top:16px">Log in</button><div id="m">'+(msg||'')+'</div></div>'
    +'<div class="note">Log in with the account for this collection point. You will see the packages the driver has placed in this point\u2019s freezer.</div>';
  document.getElementById('login').onclick=async function(){
    var m=document.getElementById('m'), b=document.getElementById('login');
    b.disabled=true; b.textContent='Logging in\u2026';
    var email=document.getElementById('email').value.trim(), pw=document.getElementById('pw').value;
    var {error}=await sb.auth.signInWithPassword({email:email,password:pw});
    if(error){ m.innerHTML='<div class="msg err">'+esc(error.message)+'</div>'; b.disabled=false; b.textContent='Log in'; return; }
    boot();
  };
}

function orderCard(o){
  var pillClass = o.status==='collected' ? 'collected' : (o.status==='ready' ? 'ready' : 'otw');
  var pillText  = o.status==='collected' ? 'Handed over' : (o.status==='ready' ? 'To hand over' : 'On the way');
  var tm = o.status==='collected' ? fmtTime(o.collected_at) : fmtTime(o.ready_at);
  return '<div class="ord"><div class="on">'+esc(o.order_id)+'</div>'
    +'<div class="cn">'+esc(o.customer_name||'')+(o.phone?(' \u00b7 '+esc(o.phone)):'')+'</div>'
    +(o.items?'<div class="it">'+esc(o.items)+'</div>':'')
    +'<div class="meta"><span class="pill '+pillClass+'">'+pillText+'</span>'
    +(o.drop_point_id?'<span class="pt">'+esc(o.drop_point_id)+'</span>':'')
    +(tm?'<span class="tm">'+tm+'</span>':'')+'</div></div>';
}

async function render(){
  view.innerHTML='<div class="card">Loading packages\u2026</div>';
  var {data,error}=await sb.rpc('ob_point_orders',{p_store:STORE});
  if(error){ view.innerHTML='<div class="msg err">'+esc(error.message)+'</div>'
    +'<div class="row-actions" style="margin-top:12px"><button class="btn sec" onclick="render()">Retry</button><button class="btn sec" onclick="logout()">Log out</button></div>'; return; }
  var list=data||[]; ORDERS=list;
  var ready=list.filter(function(o){return o.status==='ready';});
  var otw=list.filter(function(o){return o.status==='out_for_delivery';});
  var done=list.filter(function(o){return o.status==='collected';});

  var html='<button class="btn" onclick="startHandover()" style="margin-bottom:10px">'+svgScan()+' Scan customer QR to hand over</button>'+'<div class="row-actions"><button class="btn sec" onclick="render()">Refresh</button><button class="btn sec" onclick="manualHandover()">Enter number</button><button class="btn sec" onclick="logout()">Log out</button></div>';

  html+='<div class="sec-h">To hand over ('+ready.length+')</div>';
  html+= ready.length ? ready.map(orderCard).join('') : '<div class="empty">No packages waiting.</div>';

  if(otw.length){ html+='<div class="sec-h">On the way ('+otw.length+')</div>'+otw.map(orderCard).join(''); }

  html+='<div class="sec-h">Handed over today ('+done.length+')</div>';
  html+= done.length ? done.map(orderCard).join('') : '<div class="empty">Nothing handed over yet.</div>';

  html+='<div class="note">This is the shop view: packages placed in this point\u2019s freezer, with their status. Scan a customer QR above to confirm a handover.</div>';
  view.innerHTML=html;
}

function setPasswordView(){
  who.textContent='Set your password';
  view.innerHTML='<div class="card"><div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px">Set your password</div>'
    +'<div class="pt" style="margin-bottom:10px">Choose a password. Next time you just log in with your email and this password.</div>'
    +'<label>New password</label><input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters"/>'
    +'<label>Repeat</label><input id="pw2" type="password" autocomplete="new-password" placeholder="Repeat it"/>'
    +'<button class="btn" id="savepw" style="margin-top:16px">Set password &amp; continue</button><div id="m"></div></div>';
  document.getElementById('savepw').onclick=async function(){
    var p=document.getElementById('pw').value, p2=document.getElementById('pw2').value, m=document.getElementById('m');
    if(p.length<8){ m.innerHTML='<div class="msg err">Min 8 characters.</div>'; return; }
    if(p!==p2){ m.innerHTML='<div class="msg err">Passwords don\'t match.</div>'; return; }
    var b=document.getElementById('savepw'); b.disabled=true; b.textContent='Saving\u2026';
    var {error}=await sb.auth.updateUser({password:p});
    if(error){ m.innerHTML='<div class="msg err">'+esc(error.message)+'</div>'; b.disabled=false; b.textContent='Set password & continue'; return; }
    boot();
  };
}

async function boot(){
  var hash=(location.hash||'')+(location.search||'');
  var isRecovery=/type=recovery|access_token=/.test(hash);
  await new Promise(function(r){ setTimeout(r,300); });
  var {data:{session}}=await sb.auth.getSession();
  if(isRecovery && session){ history.replaceState(null,'',location.pathname); who.textContent=session.user.email; return setPasswordView(); }
  if(!session){ loginView(); return; }
  who.textContent=session.user.email;
  render();
}
function logout(){ sb.auth.signOut().then(function(){ loginView(); }); }

var ORDERS=[];
var scanStream=null;
function stopScan(){ try{ if(scanStream){ scanStream.getTracks().forEach(function(t){t.stop();}); } }catch(e){} scanStream=null; var b=document.getElementById('shscan'); if(b) b.remove(); }
function scanOnce(labelText){ return new Promise(async function(resolve){
  var box=document.createElement('div'); box.id='shscan';
  box.style.cssText='position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column';
  box.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:14px 16px;color:#fff;font:600 14px Outfit,sans-serif;background:rgba(0,0,0,.6)"><span>'+labelText+'</span><button id="shscanX" style="margin-left:auto;background:rgba(255,255,255,.16);border:0;color:#fff;font:600 14px Outfit,sans-serif;padding:9px 14px;border-radius:8px">Cancel</button></div><video id="shscanVid" playsinline style="flex:1;width:100%;object-fit:cover"></video><div class="shscan-frame"></div>';
  document.body.appendChild(box);
  var vid=document.getElementById('shscanVid'); var paused=false;
  document.getElementById('shscanX').onclick=function(){ stopScan(); resolve(null); };
  try{ scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); }catch(e){ stopScan(); resolve({error:1}); return; }
  vid.srcObject=scanStream; await vid.play();
  var det=('BarcodeDetector' in window)?new window.BarcodeDetector({formats:['qr_code']}):null;
  if(!det && !window.jsQR){ stopScan(); resolve({noDetector:true}); return; }
  var cv=document.createElement('canvas'), cx=cv.getContext('2d',{willReadFrequently:true});
  (function tick(){ if(!document.getElementById('shscan')) return; if(!paused && vid.readyState===vid.HAVE_ENOUGH_DATA){ cv.width=vid.videoWidth; cv.height=vid.videoHeight; cx.drawImage(vid,0,0,cv.width,cv.height); if(det){ det.detect(vid).then(function(cs){ if(!paused && cs && cs.length){ paused=true; stopScan(); resolve({text:cs[0].rawValue}); } }).catch(function(){}); } else { var im=cx.getImageData(0,0,cv.width,cv.height); var r=window.jsQR && jsQR(im.data,cv.width,cv.height); if(r && r.data){ paused=true; stopScan(); resolve({text:r.data}); } } } requestAnimationFrame(tick); })();
}); }
function extractOrder(raw){ if(!raw) return ''; var m=String(raw).match(/OCB-[A-Z]-[0-9]{6}-[0-9]+/i); return (m?m[0]:String(raw).trim()).toUpperCase(); }
async function startHandover(){ var r=await scanOnce('Scan the customer QR'); if(!r) return; if(r.noDetector){ return manualHandover('This device cannot scan a QR. Type the order number instead.'); } if(r.error){ return manualHandover('Camera unavailable. Type the order number instead.'); } resolveOrder(extractOrder(r.text)); }
function manualHandover(note){ var no=window.prompt((note?note+'\n\n':'')+'Order number (OCB-...)'); if(no){ resolveOrder(extractOrder(no)); } }
function resolveOrder(no){
  var o=null; for(var i=0;i<ORDERS.length;i++){ if(String(ORDERS[i].order_id).toUpperCase()===no){ o=ORDERS[i]; break; } }
  if(!o){ return verdict(false,no,'Not found at this point. Check the number, or the package may not have arrived in the freezer yet.'); }
  if(o.status==='collected'){ return verdict(true,no,'Already handed over'+(o.collected_at?(' \u00b7 '+fmtTime(o.collected_at)):'')+'.',true); }
  if(o.status!=='ready'){ return verdict(false,no,'Not ready to hand over yet (status: '+esc(o.status)+').'); }
  confirmCard(o);
}
function confirmCard(o){
  view.innerHTML='<div class="card"><div class="sec-h" style="margin-top:0">Confirm handover</div>'
   +'<div class="on">'+esc(o.order_id)+'</div>'
   +'<div class="cn">'+esc(o.customer_name||'')+(o.phone?(' \u00b7 '+esc(o.phone)):'')+'</div>'
   +(o.items?'<div class="it">'+esc(o.items)+'</div>':'')
   +'<div class="meta"><span class="pill ready">To hand over</span>'+(o.drop_point_id?'<span class="pt">'+esc(o.drop_point_id)+'</span>':'')+'</div>'
   +'<button class="btn" id="doCollect" style="margin-top:16px">Confirm handover</button>'
   +'<button class="btn sec" onclick="render()" style="margin-top:8px">Cancel</button><div id="m"></div></div>';
  document.getElementById('doCollect').onclick=function(){ doCollect(o); };
}
async function doCollect(o){
  var b=document.getElementById('doCollect'), m=document.getElementById('m');
  b.disabled=true; b.textContent='Confirming\u2026';
  var res=await sb.rpc('ob_collect',{p_store:STORE,p_order:o.order_id,p_drop_point:o.drop_point_id});
  if(res.error){ m.innerHTML='<div class="msg err">'+esc(res.error.message)+'</div>'; b.disabled=false; b.textContent='Confirm handover'; return; }
  var d=res.data;
  if(d&&d.ok){ verdict(true,o.order_id,'Handed over. The customer is cleared to leave.'); }
  else { m.innerHTML='<div class="msg err">'+esc((d&&d.reason)||'Could not confirm')+'</div>'; b.disabled=false; b.textContent='Confirm handover'; }
}
function verdict(ok,no,msg,neutral){
  var color=ok?'#2f5e46':'#a8341a', bg=ok?'#edf3ee':'#fbeae5', bd=ok?'#3f7a5a':'#a8341a';
  view.innerHTML='<div class="verdict" style="border-color:'+bd+';background:'+bg+'">'
   +'<div style="font-size:40px;line-height:1;margin-bottom:8px;color:'+color+'">'+(ok?'\u2713':'\u2715')+'</div>'
   +'<div style="font-family:ui-monospace,monospace;font-weight:700;color:'+color+';margin-bottom:6px">'+esc(no)+'</div>'
   +'<div style="font-size:14px;color:'+color+'">'+esc(msg)+'</div></div>'
   +'<button class="btn" onclick="render()">Back to packages</button>'
   +'<button class="btn sec" onclick="startHandover()" style="margin-top:8px">'+svgScan()+' Scan another</button>';
}

boot();
</script>
</body>
</html>
