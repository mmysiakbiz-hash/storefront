<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Basket — Seychelles (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1140; --indigo:#15206b; --cyan:#1ba8d3; --cyan-d:#147a9c;
  --paper:#f6f1e7; --ink:#13203a; --mut:#6a7388; --line:#e3dccd; --ok:#1f9d57; --warn:#e08a1e; --danger:#d6453f;
  --serif:'Playfair Display',serif; --sans:'Nunito Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:var(--sans);background:#0c1330;color:var(--ink)}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;overflow-x:hidden}
.topbar{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;padding:16px 18px 18px;position:relative}
.brand{font-family:var(--serif);font-weight:900;font-size:22px;letter-spacing:.3px}
.subtitle{font-size:12px;opacity:.8;margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.hamb{position:absolute;right:14px;top:16px;background:rgba(255,255,255,.12);border:0;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px}
.back{background:rgba(255,255,255,.14);border:0;color:#fff;width:34px;height:34px;border-radius:9px;font-size:20px;margin-bottom:8px}
.hero{padding:22px 18px 26px;background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff}
.hero h1{font-family:var(--serif);font-weight:900;font-size:27px;line-height:1.15;margin:0 0 4px}
.hero h1 span{color:var(--cyan)}
.home-actions{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.home-card{display:flex;align-items:center;gap:12px;text-align:left;background:rgba(255,255,255,.96);border:0;border-radius:16px;padding:16px;cursor:pointer;position:relative}
.home-card h2{font-family:var(--serif);font-size:18px;margin:0;color:var(--navy)}
.home-card p{margin:3px 0 0;font-size:12.5px;color:var(--mut)}
.home-card .chev{position:absolute;right:14px;font-size:24px;color:var(--cyan)}
.icon-badge{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:0 0 auto;color:#fff}
.home-card.local .icon-badge{background:linear-gradient(135deg,var(--cyan),var(--cyan-d))}
.home-card.travel .icon-badge{background:linear-gradient(135deg,var(--indigo),var(--navy))}
.chips{display:flex;gap:7px;flex-wrap:wrap;padding:14px 18px}
.chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:11.5px;color:var(--ink);font-weight:600}
.content{padding:14px 16px 120px}
.hero-slim{background:linear-gradient(135deg,var(--navy),var(--indigo));color:#fff;padding:14px 16px 18px}
.hero-slim .page-title{font-family:var(--serif);font-size:21px;margin:6px 0 0}
.hero-slim .page-sub{font-size:12.5px;opacity:.85;margin-top:2px}
.notice{background:#eef6f8;border-left:4px solid var(--cyan);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.notice.warn{background:#fff6e9;border-color:var(--warn)}
.notice.danger{background:#fdecea;border-color:var(--danger)}
.list{display:flex;flex-direction:column;gap:10px}
.product-row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px;cursor:pointer;text-align:left;width:100%}
.product-row .thumb{width:88px;height:62px;border-radius:10px;background-size:cover;background-position:center;flex:0 0 auto}
.product-row h3{margin:0;font-size:15.5px;font-family:var(--serif);color:var(--navy)}
.product-row .tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:10.5px;background:#eef1f6;border-radius:6px;padding:2px 7px;color:#42506b;font-weight:700}
.tag.from{background:#eaf6fa;color:var(--cyan-d)}
.product-row .arr{margin-left:auto;font-size:22px;color:var(--cyan)}
.product-photo{height:170px;border-radius:14px;background-size:cover;background-position:center;margin-bottom:12px}
.tabs{display:flex;gap:8px;margin:4px 0 10px}
.tab{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px;font-weight:800;font-size:13px;color:var(--mut)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px;font-weight:700;font-size:12.5px;color:var(--ink)}
.seg button.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.pack-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:6px 0 12px}
.pack-btn{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 0;font-weight:800;font-size:14px}
.pack-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:12px}
.panel h3{margin:0 0 8px;font-size:14px;color:var(--navy);font-family:var(--serif)}
.rec-card{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px;margin-bottom:8px;cursor:pointer}
.rec-card.active{border-color:var(--cyan);background:#f3fbfd}
.rec-card .thumb{width:54px;height:40px;border-radius:8px;background-size:cover;background-position:center;flex:0 0 auto}
.rec-card h4{margin:0;font-size:13.5px}
.rec-card p{margin:2px 0 0;font-size:11.5px;color:var(--mut)}
.rec-card .radio{margin-left:auto;width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto}
.rec-card.active .radio{border-color:var(--cyan);background:radial-gradient(circle,var(--cyan) 40%,#fff 45%)}
.mini{font-size:11.5px;color:var(--mut)}
.timer-card{display:flex;align-items:center;gap:12px;background:#101a40;color:#fff;border-radius:12px;padding:12px;margin-bottom:12px}
.timer-big{font-family:var(--serif);font-weight:900;font-size:26px;color:var(--cyan)}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:14px;font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--cyan),var(--cyan-d));color:#fff;cursor:pointer;font-family:var(--sans)}
.btn.full{margin-top:6px}
.btn.secondary{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
.btn.ghost{background:transparent;color:var(--cyan-d);border:0;width:auto;display:inline-block;padding:6px 8px;font-weight:800}
.action-row{display:flex;gap:8px}.action-row .btn{flex:1}
.sticky-cart{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;padding:10px 14px;background:linear-gradient(180deg,rgba(246,241,231,0),var(--paper) 26%)}
.cart-pill{display:flex;align-items:center;gap:10px;width:100%;background:var(--navy);color:#fff;border:0;border-radius:14px;padding:13px 15px;cursor:pointer}
.cart-pill .round{width:26px;height:26px;border-radius:50%;background:var(--cyan);display:grid;place-items:center;font-size:13px;font-weight:800}
.cart-pill small{opacity:.8;font-size:11.5px}
.cart-pill .right{margin-left:auto;text-align:right;font-weight:800}
.summary-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.summary-line:last-child{border-bottom:0}
.summary-line small{color:var(--mut);font-size:11.5px}
.cart-line{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:9px}
.cart-line .tm{margin-left:auto;text-align:right}
.cart-line .tm b{color:var(--cyan-d);font-variant-numeric:tabular-nums}
.x{background:#fbeceb;border:0;color:var(--danger);width:30px;height:30px;border-radius:8px;font-size:16px;font-weight:800}
.loading{padding:40px 16px;text-align:center;color:var(--mut)}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.banner{background:#fff;border:1px solid var(--line);border-left:4px solid var(--cyan);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:12.5px;display:flex;align-items:center;gap:8px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:#101a40;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;z-index:50;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
</style>
</head>

const API_BASE = 'https://storekit-pi.vercel.app/api/ocean-basket/v2';
const CUT_LABEL = {whole:'Whole Fish',fillet:'Fillet',portions:'Portions',heads:'Fish Heads',bottle:'Bottle'};

// ---- session ----
function sid(){ let s=localStorage.getItem('ob2_sid'); if(!s){ s='s-'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ob2_sid',s);} return s; }

// ---- state ----
const S = {
  view:'home', boot:null, units:[], cart:[],
  pid:null, cur:{state:'fresh', cut:'whole', packs:2, sel:null},
  cy:'SCR'
};

// ---- api ----
async function api(path, opts){ const r = await fetch(API_BASE+path, opts); if(!r.ok && r.status>=500) throw new Error('server'); return r.json().catch(()=>({})); }
async function loadBoot(){ S.boot = await api('/bootstrap'); S.cy = S.boot.currency || 'SCR'; }
async function loadAvail(){ const d = await api('/availability'); S.units = d.units || []; }

// ---- helpers ----
function products(){ return (S.boot && S.boot.products) || []; }
function product(id){ return products().find(p=>p.id===id); }
function variants(p){ return (p && p.variants) || []; }
function priceFor(p, state, cut){ const v = variants(p).find(x=>x.state===state && x.cut===cut); return v ? Number(v.price_per_kg) : null; }
function cutsFor(p, state){ const cs = variants(p).filter(x=>x.state===state).map(x=>x.cut); const order=['whole','fillet','portions','heads']; return order.filter(c=>cs.includes(c)); }
function money(n){ return S.cy+' '+Math.round(Number(n||0)).toLocaleString('en-US'); }
function kg(n){ return Number(n||0).toFixed(2)+' kg'; }
function unitsFor(pid, state, cut){ return S.units.filter(u=>u.product_id===pid && u.state===state && u.cut===cut && !inCart(u.uid)); }
function inCart(uid){ return S.cart.some(l=>l.uids.includes(uid)); }

// ---- pack-fit engine (z demo) ----
function recsFor(){
  const p = product(S.pid); if(!p) return [];
  if(p.type==='bottle'){
    const b = S.units.filter(u=>u.product_id===p.id && u.cut==='bottle' && !inCart(u.uid));
    return b.slice(0,1).map(u=>({key:u.uid, title:'Bottle', desc:money(u.total), uids:[u.uid], weight:0, packs:1, price:u.total, exact:true}));
  }
  const N = S.cur.packs;
  const items = unitsFor(p.id, S.cur.state, S.cur.cut).slice().sort((a,b)=>a.packs-b.packs);
  const out = [];
  items.filter(it=>it.packs===N).slice(0,3).forEach(it=>{
    out.push({key:it.uid, title:'Exact match: '+it.packs+' pack'+(it.packs>1?'s':''), desc:kg(it.weight_kg)+' • '+it.uid, uids:[it.uid], weight:it.weight_kg, packs:it.packs, price:it.total, exact:true});
  });
  if((S.cur.cut==='fillet'||S.cur.cut==='portions') && out.length<3){
    const small = items.filter(it=>it.packs<N);
    for(let i=0;i<small.length;i++) for(let j=i+1;j<small.length;j++) if(small[i].packs+small[j].packs===N && out.length<4){
      const a=small[i],b=small[j];
      out.push({key:a.uid+'+'+b.uid, title:'Combination: '+a.packs+'+'+b.packs+' packs', desc:kg(a.weight_kg+b.weight_kg), uids:[a.uid,b.uid], weight:a.weight_kg+b.weight_kg, packs:N, price:a.total+b.total, exact:true});
    }
  }
  if(out.length<3){
    items.filter(it=>!out.some(o=>o.uids.includes(it.uid))).slice(0,3-out.length).forEach(it=>{
      out.push({key:it.uid, title:'Closest: '+it.packs+' pack fit', desc:(it.packs>N?'Bigger':'Smaller')+' • '+kg(it.weight_kg)+' • '+it.uid, uids:[it.uid], weight:it.weight_kg, packs:it.packs, price:it.total, exact:false});
    });
  }
  return out;
}

// ---- reservation ----
async function holdSelection(){
  const recs = recsFor();
  const rec = recs.find(r=>r.key===S.cur.sel) || recs[0];
  if(!rec){ toast('Brak dostępnego stanu dla tego wyboru.'); return; }
  const res = await api('/reservation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'hold',session:sid(),uids:rec.uids,mode:'local'})});
  if(!res.ok){ toast('Ten kawałek własnie ktoś zarezerwował — odświeżam dostępność.'); await loadAvail(); render(); return; }
  const p = product(S.pid);
  S.cart.push({lineId:'L'+Date.now(), pid:p.id, name:p.name, state:S.cur.state, cut:S.cur.cut, packs:rec.packs, uids:rec.uids, weight:rec.weight, price:rec.price, title:rec.title, exp:Date.now()+(res.expires_in||300)*1000, extended:false});
  S.cur.sel=null;
  toast('Dodano i zarezerwowano na '+Math.round((res.expires_in||300)/60)+' min.');
  go('catalog');
}
async function releaseLine(line){
  try{ await api('/reservation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'release',session:sid(),uids:line.uids})}); }catch(e){}
}
async function removeLine(lineId){
  const i = S.cart.findIndex(l=>l.lineId===lineId); if(i<0) return;
  await releaseLine(S.cart[i]); S.cart.splice(i,1); await loadAvail(); render();
}
async function extendCart(){
  const any = S.cart.some(l=>!l.extended); if(!any){ toast('Przedłużenie już wykorzystane.'); return; }
  const res = await api('/reservation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'extend',session:sid(),mode:'local'})});
  const add = (res.added||180)*1000;
  S.cart.forEach(l=>{ if(!l.extended){ l.exp+=add; l.extended=true; }});
  toast('Przedłużono o '+Math.round((res.added||180)/60)+' min.'); render();
}

// ---- cart helpers ----
function cartTotal(){ return S.cart.reduce((a,l)=>a+l.price,0); }
function cartCount(){ return S.cart.length; }
function remainSec(){ if(!S.cart.length) return 0; const min = Math.min.apply(null,S.cart.map(l=>l.exp)); return Math.max(0,Math.round((min-Date.now())/1000)); }
function mmss(s){ const m=Math.floor(s/60), x=s%60; return m+':'+String(x).padStart(2,'0'); }

// ---- expiry tick ----
setInterval(()=>{
  let changed=false;
  S.cart = S.cart.filter(l=>{ if(l.exp<=Date.now()){ releaseLine(l); changed=true; return false;} return true; });
  // update visible timers
  document.querySelectorAll('[data-timer]').forEach(el=>{ el.textContent = mmss(remainSec()); });
  if(changed){ loadAvail().then(render); }
}, 1000);

// ---- router ----
function go(v){ S.view=v; window.scrollTo(0,0); render(); }
function render(){
  const r = document.getElementById('root');
  if(!S.boot){ r.innerHTML='<div class="loading"><div class="spinner"></div>Ładowanie…</div>'; return; }
  let h='';
  if(S.view==='home') h=home();
  else if(S.view==='catalog') h=catalog();
  else if(S.view==='product') h=productView();
  else if(S.view==='cart') h=cartView();
  else h=home();
  r.innerHTML=h;
}

// ---- screens ----
function home(){
  return `<div class="topbar"><div class="brand">Ocean Basket</div><div class="subtitle">Live Fish Market • Seychelles</div></div>
  <section class="hero"><h1>Fresh seafood,<br>packed today,<br><span>delivered tomorrow.</span></h1>
  <div class="home-actions">
    <button class="home-card local" onclick="go('catalog')"><span class="icon-badge">⚓</span><div><h2>Local Orders</h2><p>Next-day collection or delivery across Mahé.</p></div><span class="chev">›</span></button>
    <button class="home-card travel" onclick="toast('Travel Box — w kolejnym kroku')"><span class="icon-badge">❄</span><div><h2>Travel Box</h2><p>Travel-ready boxes up to 20 kg, airport-safe.</p></div><span class="chev">›</span></button>
  </div></section>
  <div class="chips"><span class="chip">🌿 Fresh</span><span class="chip">❄ Frozen</span><span class="chip">⏱ Next-day only</span><span class="chip">▦ QR receipt</span></div>`;
}

function catalog(){
  let rows = products().map(p=>{
    const ph = PHOTOS[p.id] || '';
    const tags = (p.type==='bottle') ? '<span class="tag">per bottle</span>'
      : `${p.fresh?'<span class="tag">🌿 Fresh</span>':''}${p.frozen?'<span class="tag">❄ Frozen</span>':''}`;
    const from = p.type==='bottle' ? money(p.base_price) : ('od '+money(p.base_price)+'/kg');
    return `<button class="product-row" onclick="openProduct('${p.id}')"><span class="thumb" style="background-image:url('${ph}')"></span>
      <div><h3>${p.name}</h3><div class="tags">${tags}<span class="tag from">${from}</span></div></div><span class="arr">›</span></button>`;
  }).join('');
  return header('Local Orders','Next-day delivery or collection') +
    `<div class="content"><div class="notice">📦 Zamów dziś • pakujemy wieczorem • dostawa jutro</div><div class="list">${rows}</div></div>` + sticky();
}

function openProduct(id){ S.pid=id; const p=product(id); S.cur={state:(p.fresh?'fresh':'frozen'), cut:'whole', packs:2, sel:null}; const cs=cutsFor(p,S.cur.state); if(cs.length&&!cs.includes('whole')) S.cur.cut=cs[0]; go('product'); }

function productView(){
  const p=product(S.pid); const ph=PHOTOS[p.id]||'';
  let h = header(p.name, p.type==='bottle'?'Bottle / pack':'Local Catch');
  h += `<div class="content"><div class="product-photo" style="background-image:url('${ph}')"></div>`;
  if(p.type==='bottle'){
    const recs=recsFor(); const r=recs[0];
    h += `<div class="panel"><h3>${p.name}</h3><p class="mini">Pozycja butelkowana — omija silnik porcji.</p><div class="summary-line"><span>Cena</span><b>${money(p.base_price)}</b></div></div>`;
    h += `<button class="btn full" ${r?'':'disabled style=\"opacity:.5\"'} onclick="S.cur.sel='${r?r.key:''}';holdSelection()">Dodaj butelkę do koszyka</button>`;
    return h + sticky() + '</div>';
  }
  // state tabs
  const states=[]; if(p.fresh)states.push('fresh'); if(p.frozen)states.push('frozen');
  h += `<div class="tabs">${states.map(s=>`<button class="tab ${S.cur.state===s?'active':''}" onclick="setState('${s}')">${s==='fresh'?'🌿 Fresh':'❄ Frozen'}</button>`).join('')}</div>`;
  // cut seg
  const cuts=cutsFor(p,S.cur.state).filter(c=>c!=='heads');
  h += `<div class="seg">${cuts.map(c=>`<button class="${S.cur.cut===c?'active':''}" onclick="setCut('${c}')">${CUT_LABEL[c]}</button>`).join('')}</div>`;
  const pkg = priceFor(p,S.cur.state,S.cur.cut);
  h += `<div class="mini" style="margin:-4px 0 10px">Cena: <b>${pkg!=null?money(pkg)+'/kg':'—'}</b></div>`;
  // packs
  h += `<h3 style="font-family:var(--serif);color:var(--navy);font-size:15px;margin:4px 0 6px">Na ile paczek?</h3>`;
  h += `<div class="pack-grid">${[1,2,3,4,5,6,7,8].map(n=>`<button class="pack-btn ${S.cur.packs===n?'active':''}" onclick="setPacks(${n})">${n}</button>`).join('')}</div>`;
  // recommendations
  const recs=recsFor(); const sel=S.cur.sel||(recs[0]&&recs[0].key);
  h += `<div class="panel"><h3>Propozycja na ${S.cur.packs} pacz${S.cur.packs>1?'ki':'kę'}</h3>`;
  if(recs.length){ h += recs.map(r=>`<button class="rec-card ${sel===r.key?'active':''}" onclick="S.cur.sel='${r.key}';render()"><span class="thumb" style="background-image:url('${ph}')"></span><div><h4>${r.title}</h4><p>${r.desc}</p><p><b>${kg(r.weight)} • ${money(r.price)}</b>${r.exact?'':' • closest'}</p></div><span class="radio"></span></button>`).join(''); }
  else { h += `<div class="notice danger">Brak stanu online dla tego wyboru. Zmień cięcie lub liczbę paczek.</div>`; }
  h += `</div>`;
  h += `<div class="timer-card"><div class="timer-big">05:00</div><div><b>Po dodaniu</b><br><span class="mini">stan znika z dostępności. Jedno przedłużenie.</span></div></div>`;
  h += `<div class="action-row"><button class="btn" ${recs.length?'':'disabled style=\"opacity:.5\"'} onclick="holdSelection()">Dodaj do koszyka</button><button class="btn secondary" onclick="go('catalog')">Wróć</button></div>`;
  return h + sticky() + '</div>';
}

function cartView(){
  let h = header('Koszyk','Rezerwacja trzymana z licznikiem');
  h += '<div class="content">';
  if(!S.cart.length){ h += '<div class="notice">Koszyk jest pusty.</div><button class="btn" onclick="go(\'catalog\')">Przeglądaj katalog</button>'; return h+'</div>'; }
  h += S.cart.map(l=>`<div class="cart-line"><span class="thumb" style="width:54px;height:40px;border-radius:8px;background-size:cover;background-position:center;background-image:url('${PHOTOS[l.pid]||''}')"></span>
    <div><b style="font-size:13.5px">${l.name}</b><div class="mini">${l.state==='fresh'?'Fresh':'Frozen'} • ${CUT_LABEL[l.cut]} • ${kg(l.weight)}</div><div class="mini">${money(l.price)}</div></div>
    <div class="tm"><div class="mini">zostało</div><b data-timer>${mmss(remainSec())}</b><br><button class="x" onclick="removeLine('${l.lineId}')">×</button></div></div>`).join('');
  h += `<div class="panel"><div class="summary-line"><span>Razem</span><b>${money(cartTotal())}</b></div><div class="summary-line"><span class="mini">Rezerwacja wygasa za</span><b data-timer>${mmss(remainSec())}</b></div></div>`;
  h += `<div class="action-row"><button class="btn secondary" onclick="extendCart()">Przedłuż +3 min</button><button class="btn" onclick="toast('Checkout — w kolejnym kroku')">Do płatności</button></div>`;
  return h + sticky() + '</div>';
}

// ---- shared ----
function header(title,sub){ return `<div class="hero-slim"><button class="back" onclick="go('${S.view==='product'?'catalog':'home'}')">‹</button><div class="brand">Ocean Basket</div><div class="subtitle">Seychelles</div><h1 class="page-title">${title}</h1>${sub?`<div class="page-sub">${sub}</div>`:''}</div>`; }
function sticky(){
  if(!S.cart.length) return `<div class="sticky-cart"><button class="cart-pill" onclick="go('cart')"><span class="round">🛒</span><span>Koszyk pusty</span><small>&nbsp;Zacznij zamówienie</small><span class="right">›</span></button></div>`;
  return `<div class="sticky-cart"><button class="cart-pill" onclick="go('cart')"><span class="round">${cartCount()}</span><div><span>Koszyk • ${cartCount()} poz.</span><br><small>${money(cartTotal())}</small></div><span class="right" data-timer>${mmss(remainSec())}</span></button></div>`;
}
function setState(s){ S.cur.state=s; const cs=cutsFor(product(S.pid),s); if(!cs.includes(S.cur.cut)) S.cur.cut=cs[0]||'whole'; S.cur.sel=null; render(); }
function setCut(c){ S.cur.cut=c; S.cur.sel=null; render(); }
function setPacks(n){ S.cur.packs=n; S.cur.sel=null; render(); }
function toast(m){ const t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }

// ---- boot ----
(async function(){
  try{ await loadBoot(); await loadAvail(); render(); }
  catch(e){ document.getElementById('root').innerHTML='<div class="loading">Nie udało się załadować katalogu. Odśwież stronę.<br><span class="mini">'+(e&&e.message||'')+'</span></div>'; }
})();
</script>
</body>
</html>
