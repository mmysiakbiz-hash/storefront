<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Ocean Basket — Driver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf7f0; --paper2:#f1ece1; --ink:#0a1140; --char:#23262b;
    --gilt:#1ba8d3; --line:#e4ddcf; --mut:#857f74;
    --ok:#3f7a5a; --ok-bg:#edf3ee; --pink:#b5573a; --pink-bg:#f6ece7;
    --max:480px; --serif:'Bodoni Moda',Didot,Georgia,serif;
    --sans:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:#0a0a0a;color:var(--char);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{max-width:var(--max);margin:0 auto;min-height:100dvh;background:var(--paper);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.3)}
  .topbar{position:sticky;top:0;background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:11px}
  .topbar .mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(150deg,var(--gilt),#0f6f8c)}
  .topbar b{font-weight:600;font-size:14.5px}
  .topbar .role{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.28);border-radius:3px;padding:4px 9px}
  .body{padding:22px 18px 30px;flex:1}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--mut);font-weight:600;margin:0 0 10px}
  h1{font-family:var(--serif);font-weight:500;font-size:30px;line-height:1.1;color:var(--ink);margin:2px 0 8px}
  .sub{color:var(--mut);font-size:14px;margin:0 0 22px}
  label{display:block;font-size:12px;font-weight:600;color:var(--char);margin:0 0 6px;letter-spacing:.01em}
  input{width:100%;font-family:inherit;font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--char);margin-bottom:14px}
  input:focus{outline:none;border-color:var(--gilt)}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ink);color:#fff;font-family:inherit;font-weight:700;font-size:15px;padding:15px 20px;border-radius:4px;border:1px solid var(--ink);cursor:pointer;letter-spacing:.02em}
  .btn:active{transform:translateY(1px)} .btn[disabled]{opacity:.55}
  .msg{font-size:13.5px;padding:12px 14px;border-radius:6px;margin:0 0 16px;line-height:1.5}
  .msg.err{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink)}
  .msg.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok)}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px}
  .hint{font-size:12.5px;color:var(--mut);text-align:center;margin:16px 4px 0;line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="mark"></span><b>Ocean Basket</b><span class="role">Driver</span></div>
  <div class="body" id="view"><div class="card">Loading…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://xhhwyyrbdhxgtcbpvges.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoaHd5eXJiZGh4Z3RjYnB2Z2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODgwMzMsImV4cCI6MjA5Njk2NDAzM30.wt5VQVCCZHEBAgygBdCWJzCR7bisbAAP_Q5uVFVEADU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { detectSessionInUrl:true, flowType:'implicit', persistSession:true, autoRefreshToken:true }
});
const view=document.getElementById('view');
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

function screenSetPassword(){
  view.innerHTML=`
    <p class="eyebrow">Welcome</p><h1>Set your password</h1>
    <p class="sub">Choose a password for your driver account. Next time you just log in with your email and this password.</p>
    <div id="msg"></div>
    <div class="card">
      <label>New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters"/>
      <label>Repeat password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Repeat it"/>
      <button class="btn" id="save">Set password &amp; continue</button>
    </div>`;
  document.getElementById('save').onclick=async()=>{
    const pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
    const msg=document.getElementById('msg');
    if(pw.length<8){msg.innerHTML='<div class="msg err">Password needs at least 8 characters.</div>';return;}
    if(pw!==pw2){msg.innerHTML='<div class="msg err">The two passwords don\'t match.</div>';return;}
    const btn=document.getElementById('save'); btn.disabled=true; btn.textContent='Saving…';
    const {error}=await sb.auth.updateUser({password:pw});
    if(error){msg.innerHTML='<div class="msg err">'+error.message+'</div>';btn.disabled=false;btn.textContent='Set password & continue';return;}
    screenHome();
  };
}

function screenLogin(note){
  view.innerHTML=`
    <p class="eyebrow">Driver</p><h1>Log in</h1>
    <p class="sub">Use the email HQ set up for you and your password.</p>
    <div id="msg">${note?'<div class="msg ok">'+note+'</div>':''}</div>
    <div class="card">
      <label>Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@example.com"/>
      <label>Password</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="Your password"/>
      <button class="btn" id="login">Log in</button>
    </div>
    <p class="hint">First time? Open the set-up link HQ sent you to choose a password.</p>`;
  document.getElementById('login').onclick=async()=>{
    const email=document.getElementById('email').value.trim(), pw=document.getElementById('pw').value;
    const msg=document.getElementById('msg');
    const btn=document.getElementById('login'); btn.disabled=true; btn.textContent='Logging in…';
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){msg.innerHTML='<div class="msg err">'+error.message+'</div>';btn.disabled=false;btn.textContent='Log in';return;}
    screenHome();
  };
}

async function screenHome(){
  const {data:{user}}=await sb.auth.getUser();
  view.innerHTML=`
    <p class="eyebrow">Signed in</p><h1>You're set</h1>
    <p class="sub">${user?user.email:''} — your driver account is ready. Your delivery run (today's freezers and bags) will appear here.</p>
    <div class="card">
      <p style="margin:0 0 14px;color:var(--mut);font-size:13.5px">Next step in the build: your assigned orders for the day, grouped by freezer, with scan-to-stock.</p>
      <button class="btn" id="out">Log out</button>
    </div>`;
  document.getElementById('out').onclick=async()=>{await sb.auth.signOut();screenLogin('Logged out.');};
}

(async ()=>{
  // if arriving from a set-password / recovery link, Supabase parses the URL hash.
  const hash=(location.hash||'')+(location.search||'');
  const isRecovery=/type=recovery|access_token=/.test(hash);
  await new Promise(r=>setTimeout(r,300)); // let detectSessionInUrl settle
  const {data:{session}}=await sb.auth.getSession();
  if(isRecovery && session){ history.replaceState(null,'',location.pathname); return screenSetPassword(); }
  if(session){ return screenHome(); }
  screenLogin();
})();
</script>
</body>
</html>
