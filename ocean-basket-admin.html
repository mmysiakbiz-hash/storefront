<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Basket — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500..700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#06222e; --ink2:#0d3b4f; --char:#23262b;
  --gilt:#9c7c4a; --pink:#b5573a;
  --paper:#faf7f0; --paper2:#f1ece1; --line:#e4ddcf;
  --fresh:#3f7a5a; --fresh-bg:#edf3ee; --frozen:#3f6e9e; --frozen-bg:#eef2f6;
  --mut:#857f74; --ok:#3f7a5a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--paper2);color:var(--char);font-size:15px;line-height:1.5}
h1,h2,h3{font-family:'Bodoni Moda',Georgia,serif;font-weight:500;color:var(--ink);letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--ink)}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:40px;max-width:400px;width:100%;text-align:center}
.login-card h1{font-size:30px;margin-bottom:6px}
.login-card .sub{color:var(--mut);font-size:14px;margin-bottom:26px}
.login-card .field{text-align:left;margin-bottom:16px}
.login-card label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.login-card input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:4px}
.login-card input:focus{outline:none;border-color:var(--gilt)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;font-weight:600;padding:14px 20px;border-radius:4px;width:100%;font-size:15px}
.btn:disabled{opacity:.5}
.btn.gilt{background:var(--gilt)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.sm{width:auto;padding:9px 14px;font-size:13px}
.btn.danger{background:#fff;color:var(--pink);border:1px solid #e8c4ba}
.msg{font-size:13px;padding:12px;border-radius:4px;margin-top:14px}
.msg.ok{background:var(--fresh-bg);color:var(--fresh)}
.msg.err{background:#fbeae5;color:var(--pink)}

/* app shell */
.shell{display:none;min-height:100vh}
.shell.on{display:block}
.topbar{background:var(--ink);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar h1{color:#fff;font-size:20px;flex:1}
.topbar .who{font-size:12.5px;opacity:.7}
.topbar .out{font-size:13px;color:#fff;opacity:.85;text-decoration:underline}
.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:0;padding:0 16px;position:sticky;top:56px;z-index:40;overflow-x:auto}
.tabs button{padding:15px 18px;font-size:14px;font-weight:600;color:var(--mut);border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.on{color:var(--ink);border-bottom-color:var(--gilt)}
.wrap{max-width:920px;margin:0 auto;padding:24px}
.panel{display:none}
.panel.on{display:block;animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-head h2{font-size:24px}
.card{background:#fff;border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:16px}
.muted{color:var(--mut)}

/* product list */
.prod-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.prod-row:last-child{border-bottom:none}
.prod-row .pmain{flex:1}
.prod-row .pmain h3{font-size:18px;margin-bottom:2px}
.prod-row .pmain .latin{font-style:italic;color:var(--mut);font-size:13px}
.prod-row .pforms{font-size:12.5px;color:var(--mut);margin-top:4px}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:3px;margin-right:5px}
.badge.fresh{background:var(--fresh-bg);color:var(--fresh)}
.badge.frozen{background:var(--frozen-bg);color:var(--frozen)}
.badge.off{background:#eee;color:#999}

/* forms / editor */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:4px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gilt)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row-flex{display:flex;gap:10px;align-items:flex-end}
.form-line{display:grid;grid-template-columns:1fr 110px 90px 36px;gap:8px;align-items:center;margin-bottom:8px}
.form-line input,.form-line select{padding:10px;font-size:13px}
.form-line .del{color:var(--pink);font-size:18px;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(6,34,46,.5);z-index:100;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:8px;padding:24px;max-width:560px;width:100%;margin:auto}
.modal h2{font-size:22px;margin-bottom:18px}
.modal-foot{display:flex;gap:10px;margin-top:20px}

/* points */
.point-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.point-row:last-child{border-bottom:none}
.point-row .num{width:30px;height:30px;border-radius:50%;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.point-row .pi{flex:1}
.point-row .pi h3{font-size:16px;font-family:'Outfit';font-weight:600}
.point-row .pi p{font-size:12.5px;color:var(--mut)}

/* orders */
.order-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.order-row:last-child{border-bottom:none}
.order-row .oinfo{flex:1}
.order-row .ono{font-family:'Bodoni Moda',serif;font-weight:600;font-size:16px}
.order-row .ometa{font-size:12.5px;color:var(--mut)}
.statpill{font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;border:1px solid var(--line);background:#fff;color:var(--char)}
.loading{text-align:center;padding:50px;color:var(--mut)}
.empty{text-align:center;padding:50px;color:var(--mut)}
.empty h3{font-size:20px;margin-bottom:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:6px;font-size:14px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.stock-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.stock-head h3{flex:1;font-size:18px}
.stock-head .num{width:28px;height:28px;border-radius:50%;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stock-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
.stock-row .si{flex:1}
.stock-row .sn{font-size:14px;font-weight:500;color:var(--ink)}
.stock-row .skg{width:90px;padding:9px 10px;border:1px solid var(--line);border-radius:4px;font-size:14px;text-align:right}
.stock-row .kgunit{font-size:12px;color:var(--mut)}
.stock-row .del{color:var(--pink);font-size:20px;width:30px;text-align:center}

</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <h1>Ocean Basket</h1>
    <p class="sub">Admin panel — sign in to manage your shop.</p>
    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <button class="btn" id="loginBtn" onclick="sendLink()">Send sign-in link</button>
    </div>
    <div id="login-msg"></div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="shell" id="shell">
  <div class="topbar">
    <h1>Ocean Basket Admin</h1>
    <span class="who" id="who"></span>
    <button class="out" onclick="signOut()">Sign out</button>
  </div>
  <div class="tabs">
    <button class="on" data-tab="products" onclick="tab('products')">Products</button>
    <button data-tab="points" onclick="tab('points')">Collection points</button>
    <button data-tab="stock" onclick="tab('stock')">Stock</button>
    <button data-tab="orders" onclick="tab('orders')">Orders</button>
    <button data-tab="settings" onclick="tab('settings')">Settings</button>
  </div>
  <div class="wrap">
    <div class="panel on" id="p-products"><div class="loading">Loading…</div></div>
    <div class="panel" id="p-points"><div class="loading">Loading…</div></div>
    <div class="panel" id="p-stock"><div class="loading">Loading…</div></div>
    <div class="panel" id="p-orders"><div class="loading">Loading…</div></div>
    <div class="panel" id="p-settings"><div class="loading">Loading…</div></div>
  </div>
</div>

<!-- product editor modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL='https://xhhwyyrbdhxgtcbpvges.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoaHd5eXJiZGh4Z3RjYnB2Z2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODgwMzMsImV4cCI6MjA5Njk2NDAzM30.wt5VQVCCZHEBAgygBdCWJzCR7bisbAAP_Q5uVFVEADU';
var STORE_ID='11111111-1111-1111-1111-111111111111';
var sb = supabase.createClient(SUPABASE_URL, ANON);

var state={ user:null, products:[], forms:[], points:[], orders:[], settings:{}, stock:[] };
function el(id){return document.getElementById(id);}
function money(n){return 'SCR '+Number(n).toLocaleString('en-US');}

/* ---------- AUTH ---------- */
function sendLink(){
  var email=el('email').value.trim();
  if(!email){ msg('Enter your email','err'); return; }
  var btn=el('loginBtn'); btn.disabled=true; btn.textContent='Sending…';
  sb.auth.signInWithOtp({ email: email, options:{ emailRedirectTo: location.href.split('#')[0] } })
    .then(function(res){
      btn.disabled=false; btn.textContent='Send sign-in link';
      if(res.error){ msg(res.error.message,'err'); }
      else { el('login-form').style.display='none'; msg('Check your inbox — we sent a sign-in link to '+email+'. Click it on this device.','ok'); }
    });
}
function msg(t,kind){ el('login-msg').innerHTML='<div class="msg '+kind+'">'+t+'</div>'; }

function signOut(){ sb.auth.signOut().then(function(){ location.reload(); }); }

/* check session on load + after magic-link redirect */
function boot(){
  sb.auth.getSession().then(function(res){
    var session=res.data.session;
    if(session && session.user){ onLogin(session.user); }
    else { el('login').style.display='flex'; }
  });
}
sb.auth.onAuthStateChange(function(event, session){
  if(session && session.user && !state.user){ onLogin(session.user); }
});

function onLogin(user){
  state.user=user;
  el('login').style.display='none';
  el('shell').classList.add('on');
  el('who').textContent=user.email;
  loadAll();
}

/* ---------- LOAD DATA ---------- */
function loadAll(){
  Promise.all([loadProducts(), loadPoints(), loadStock(), loadOrders(), loadSettings()]);
}
function loadProducts(){
  return Promise.all([
    sb.from('products').select('*').eq('store_id',STORE_ID).order('position'),
    sb.from('product_forms').select('*').eq('store_id',STORE_ID).order('position')
  ]).then(function(r){
    state.products=r[0].data||[]; state.forms=r[1].data||[];
    renderProducts();
  });
}
function loadPoints(){
  return sb.from('collection_points').select('*').eq('store_id',STORE_ID).order('number')
    .then(function(r){ state.points=r.data||[]; renderPoints(); });
}
function loadOrders(){
  return sb.from('orders').select('*').eq('store_id',STORE_ID).order('created_at',{ascending:false}).limit(50)
    .then(function(r){ state.orders=r.data||[]; renderOrders(); });
}
function loadSettings(){
  return sb.from('stores').select('settings,name,currency').eq('id',STORE_ID).single()
    .then(function(r){ state.settings=(r.data&&r.data.settings)||{}; renderSettings(); });
}

/* ---------- TABS ---------- */
function tab(name){
  document.querySelectorAll('.tabs button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-tab')===name); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  el('p-'+name).classList.add('on');
}

/* ---------- PRODUCTS ---------- */
function formsFor(pid){ return state.forms.filter(function(f){return f.product_id===pid}); }
function renderProducts(){
  var host=el('p-products');
  var rows = state.products.map(function(p){
    var fs=formsFor(p.id);
    var badges=fs.map(function(f){ return '<span class="badge '+f.state+'">'+f.state+'</span>'; });
    var uniq={}; var badgeHtml='';
    if(fs.some(function(f){return f.state==='fresh'})) badgeHtml+='<span class="badge fresh">fresh</span>';
    if(fs.some(function(f){return f.state==='frozen'})) badgeHtml+='<span class="badge frozen">frozen</span>';
    if(!p.active) badgeHtml+='<span class="badge off">hidden</span>';
    var formList=fs.map(function(f){return f.label+' · '+money(f.price)+'/kg'}).join(' · ');
    return '<div class="prod-row">'+
      '<div class="pmain"><h3>'+(p.name&&p.name.en||p.slug)+'</h3>'+
      '<div class="latin">'+(p.subtitle&&p.subtitle.en||'')+(p.secondary&&p.secondary.en?(' · '+p.secondary.en):'')+'</div>'+
      '<div class="pforms">'+badgeHtml+'<br>'+(formList||'<span style="color:#c0341a">no forms yet</span>')+'</div></div>'+
      '<button class="btn ghost sm" onclick="editProduct(\''+p.id+'\')">Edit</button>'+
    '</div>';
  }).join('');
  host.innerHTML='<div class="section-head"><h2>Products</h2><button class="btn gilt sm" onclick="editProduct(null)">+ Add fish</button></div>'+
    '<div class="card">'+(rows||'<div class="empty"><h3>No products</h3><p>Add your first fish.</p></div>')+'</div>';
}

function editProduct(pid){
  var p = pid ? state.products.find(function(x){return x.id===pid}) : null;
  var fs = pid ? formsFor(pid) : [];
  window._editForms = fs.map(function(f){return {id:f.id,code:f.code,label:f.label,state:f.state,price:f.price,active:f.active};});
  if(!window._editForms.length) window._editForms=[{code:'',label:'',state:'fresh',price:0,active:true}];

  el('modal').innerHTML='<h2>'+(p?'Edit fish':'Add fish')+'</h2>'+
    '<div class="field"><label>Name (English)</label><input id="m-name" value="'+(p&&p.name&&p.name.en||'')+'" placeholder="Red Snapper"></div>'+
    '<div class="grid2">'+
      '<div class="field"><label>Latin name</label><input id="m-latin" value="'+(p&&p.subtitle&&p.subtitle.en||'')+'" placeholder="Lutjanus bohar"></div>'+
      '<div class="field"><label>Creole name</label><input id="m-local" value="'+(p&&p.secondary&&p.secondary.en||'')+'" placeholder="Babonn"></div>'+
    '</div>'+
    '<div class="field"><label>Short description</label><textarea id="m-desc" rows="2" placeholder="Mild, sweet white flesh…">'+(p&&p.short&&p.short.en||'')+'</textarea></div>'+
    '<div class="field"><label>Visible in app</label><select id="m-active"><option value="1"'+((!p||p.active)?' selected':'')+'>Yes — show</option><option value="0"'+((p&&!p.active)?' selected':'')+'>No — hide</option></select></div>'+
    '<div class="field"><label>Forms &amp; prices</label>'+
      '<div class="form-line" style="font-size:11px;color:var(--mut);margin-bottom:4px"><span>Label</span><span>State</span><span>SCR/kg</span><span></span></div>'+
      '<div id="m-forms"></div>'+
      '<button class="btn ghost sm" style="margin-top:6px" onclick="addFormLine()">+ Add form</button>'+
    '</div>'+
    '<div class="modal-foot">'+
      (p?'<button class="btn danger sm" onclick="deleteProduct(\''+p.id+'\')">Delete</button>':'')+
      '<button class="btn ghost" onclick="closeModal()">Cancel</button>'+
      '<button class="btn gilt" onclick="saveProduct(\''+(pid||'')+'\')">Save</button>'+
    '</div>';
  renderFormLines();
  el('modal-bg').classList.add('on');
}
function renderFormLines(){
  el('m-forms').innerHTML = window._editForms.map(function(f,i){
    return '<div class="form-line">'+
      '<input value="'+(f.label||'').replace(/"/g,'&quot;')+'" placeholder="Fresh fillet — skin off" oninput="window._editForms['+i+'].label=this.value">'+
      '<select onchange="window._editForms['+i+'].state=this.value"><option value="fresh"'+(f.state==='fresh'?' selected':'')+'>Fresh</option><option value="frozen"'+(f.state==='frozen'?' selected':'')+'>Frozen</option></select>'+
      '<input type="number" value="'+(f.price||0)+'" oninput="window._editForms['+i+'].price=parseFloat(this.value)||0">'+
      '<button class="del" onclick="removeFormLine('+i+')">×</button>'+
    '</div>';
  }).join('');
}
function addFormLine(){ window._editForms.push({code:'',label:'',state:'fresh',price:0,active:true}); renderFormLines(); }
function removeFormLine(i){ window._editForms.splice(i,1); if(!window._editForms.length)addFormLine(); renderFormLines(); }
function closeModal(){ el('modal-bg').classList.remove('on'); }

function slugify(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function codify(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,30); }

function saveProduct(pid){
  var name=el('m-name').value.trim();
  if(!name){ toast('Name is required'); return; }
  var payload={
    store_id:STORE_ID,
    slug: pid ? undefined : slugify(name),
    name:{en:name},
    subtitle:{en:el('m-latin').value.trim()},
    secondary:{en:el('m-local').value.trim()},
    short:{en:el('m-desc').value.trim()},
    active: el('m-active').value==='1'
  };
  var forms=window._editForms.filter(function(f){return f.label.trim()});
  forms.forEach(function(f){ if(!f.code) f.code=codify(f.label); });

  var p;
  if(pid){
    p = sb.from('products').update({name:payload.name,subtitle:payload.subtitle,secondary:payload.secondary,short:payload.short,active:payload.active}).eq('id',pid).select().single();
  } else {
    p = sb.from('products').insert(payload).select().single();
  }
  p.then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    var productId=res.data.id;
    // upsert forms: simplest robust path — delete existing then insert current set
    return sb.from('product_forms').delete().eq('product_id',productId).then(function(){
      var rows=forms.map(function(f,i){ return {store_id:STORE_ID,product_id:productId,code:f.code||('f'+i),label:f.label.trim(),state:f.state,price:f.price,position:i,active:true}; });
      if(!rows.length) return {data:[]};
      return sb.from('product_forms').insert(rows);
    }).then(function(r2){
      if(r2&&r2.error){ toast('Forms error: '+r2.error.message); return; }
      toast('Saved'); closeModal(); loadProducts();
    });
  });
}
function deleteProduct(pid){
  if(!confirm('Delete this fish and all its forms?')) return;
  sb.from('products').delete().eq('id',pid).then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    toast('Deleted'); closeModal(); loadProducts();
  });
}

/* ---------- POINTS ---------- */
function renderPoints(){
  var host=el('p-points');
  var rows=state.points.map(function(p){
    return '<div class="point-row">'+
      '<span class="num" style="background:'+(p.colour||'#06222e')+'">'+p.number+'</span>'+
      '<div class="pi"><h3>'+p.name+(p.is_outlet?' <span style="font-size:10px;color:var(--gilt)">· outlet</span>':'')+(p.active?'':' <span class="badge off">off</span>')+'</h3><p>'+(p.description||'')+'</p></div>'+
      '<button class="btn ghost sm" onclick="editPoint('+p.number+')">Edit</button>'+
    '</div>';
  }).join('');
  host.innerHTML='<div class="section-head"><h2>Collection points</h2><button class="btn gilt sm" onclick="editPoint(null)">+ Add point</button></div>'+
    '<div class="card">'+(rows||'<div class="empty"><h3>No points</h3></div>')+'</div>';
}
function editPoint(num){
  var p = num ? state.points.find(function(x){return x.number===num}) : null;
  var nextNum = state.points.length ? Math.max.apply(null,state.points.map(function(x){return x.number}))+1 : 1;
  el('modal').innerHTML='<h2>'+(p?'Edit point':'Add point')+'</h2>'+
    '<div class="grid2">'+
      '<div class="field"><label>Number</label><input type="number" id="pt-num" value="'+(p?p.number:nextNum)+'"></div>'+
      '<div class="field"><label>Colour</label><input type="color" id="pt-col" value="'+(p&&p.colour||'#06222e')+'" style="height:44px;padding:4px"></div>'+
    '</div>'+
    '<div class="field"><label>Name</label><input id="pt-name" value="'+(p&&p.name||'')+'" placeholder="Beau Vallon"></div>'+
    '<div class="field"><label>Description</label><input id="pt-desc" value="'+(p&&p.description||'')+'" placeholder="Shop · open till 18:00"></div>'+
    '<div class="grid2">'+
      '<div class="field"><label>Map X (0–100)</label><input type="number" id="pt-x" value="'+(p&&p.x!=null?p.x:50)+'"></div>'+
      '<div class="field"><label>Map Y (0–100)</label><input type="number" id="pt-y" value="'+(p&&p.y!=null?p.y:50)+'"></div>'+
    '</div>'+
    '<div class="grid2">'+
      '<div class="field"><label>Travel-box outlet?</label><select id="pt-outlet"><option value="0"'+((!p||!p.is_outlet)?' selected':'')+'>No</option><option value="1"'+((p&&p.is_outlet)?' selected':'')+'>Yes</option></select></div>'+
      '<div class="field"><label>Active</label><select id="pt-active"><option value="1"'+((!p||p.active)?' selected':'')+'>Yes</option><option value="0"'+((p&&!p.active)?' selected':'')+'>No</option></select></div>'+
    '</div>'+
    '<div class="modal-foot">'+
      (p?'<button class="btn danger sm" onclick="deletePoint('+p.number+')">Delete</button>':'')+
      '<button class="btn ghost" onclick="closeModal()">Cancel</button>'+
      '<button class="btn gilt" onclick="savePoint('+(p?p.number:'null')+')">Save</button>'+
    '</div>';
  el('modal-bg').classList.add('on');
}
function savePoint(origNum){
  var row={
    store_id:STORE_ID,
    number:parseInt(el('pt-num').value,10),
    name:el('pt-name').value.trim(),
    description:el('pt-desc').value.trim(),
    colour:el('pt-col').value,
    is_outlet: el('pt-outlet').value==='1',
    x:parseFloat(el('pt-x').value)||0,
    y:parseFloat(el('pt-y').value)||0,
    active: el('pt-active').value==='1'
  };
  if(!row.name){ toast('Name required'); return; }
  var q;
  if(origNum){ q=sb.from('collection_points').update(row).eq('store_id',STORE_ID).eq('number',origNum); }
  else { q=sb.from('collection_points').insert(row); }
  q.then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    toast('Saved'); closeModal(); loadPoints();
  });
}
function deletePoint(num){
  if(!confirm('Delete point '+num+'?')) return;
  sb.from('collection_points').delete().eq('store_id',STORE_ID).eq('number',num).then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    toast('Deleted'); closeModal(); loadPoints();
  });
}


/* ---------- STOCK (per point) ---------- */
function loadStock(){
  return sb.from('point_stock').select('*').eq('store_id',STORE_ID)
    .then(function(r){ state.stock=r.data||[]; renderStock(); });
}
function allForms(){
  // flatten product -> forms with display name
  var out=[];
  state.products.forEach(function(p){
    formsFor(p.id).forEach(function(f){
      out.push({ id:f.id, product:(p.name&&p.name.en||p.slug), label:f.label, state:f.state, price:f.price });
    });
  });
  return out;
}
function stockFor(formId, pointNum){
  return state.stock.find(function(s){ return s.form_id===formId && s.point_number===pointNum; });
}
function renderStock(){
  var host=el('p-stock');
  if(!state.points.length || !state.products.length){
    host.innerHTML='<div class="section-head"><h2>Stock</h2></div><div class="card"><div class="empty"><h3>Add products and points first</h3><p>Stock is set per form, per collection point.</p></div></div>';
    return;
  }
  // group by point: show each point, list forms with stock there + add button
  var blocks = state.points.map(function(pt){
    var rows = state.stock.filter(function(s){ return s.point_number===pt.number; }).map(function(s){
      var f = allForms().find(function(x){return x.id===s.form_id;});
      var nm = f ? (f.product+' · '+f.label) : '(unknown form)';
      var badge = f ? '<span class="badge '+f.state+'">'+f.state+'</span>' : '';
      return '<div class="stock-row">'+
        '<div class="si"><div class="sn">'+nm+'</div><div>'+badge+'</div></div>'+
        '<input class="skg" type="number" step="0.5" value="'+s.available_kg+'" onchange="saveStock(\''+s.form_id+'\','+pt.number+',this.value)"> <span class="kgunit">kg</span>'+
        '<button class="del" onclick="delStock(\''+s.form_id+'\','+pt.number+')">×</button>'+
      '</div>';
    }).join('');
    return '<div class="card">'+
      '<div class="stock-head"><span class="num" style="background:'+(pt.colour||'#06222e')+'">'+pt.number+'</span>'+
        '<h3>'+pt.name+'</h3>'+
        '<button class="btn ghost sm" onclick="addStock('+pt.number+')">+ Add stock</button></div>'+
      (rows || '<div class="muted" style="font-size:13px;padding:8px 0">Nothing stocked here yet.</div>')+
    '</div>';
  }).join('');
  host.innerHTML='<div class="section-head"><h2>Stock per point</h2><button class="btn ghost sm" onclick="loadStock()">Refresh</button></div>'+
    '<p class="muted" style="font-size:13px;margin:-8px 0 16px">Set how many kg of each form are available at each point. Empty = not available there. Customers only see what is in stock at their chosen point.</p>'+
    blocks;
}
function addStock(pointNum){
  var forms=allForms();
  if(!forms.length){ toast('Add product forms first'); return; }
  // exclude forms already stocked at this point
  var taken = state.stock.filter(function(s){return s.point_number===pointNum;}).map(function(s){return s.form_id;});
  var avail = forms.filter(function(f){ return taken.indexOf(f.id)===-1; });
  if(!avail.length){ toast('All forms already added at this point'); return; }
  var pt=state.points.find(function(p){return p.number===pointNum;});
  el('modal').innerHTML='<h2>Add stock — '+(pt?pt.name:('point '+pointNum))+'</h2>'+
    '<div class="field"><label>Form</label><select id="st-form">'+
      avail.map(function(f){ return '<option value="'+f.id+'">'+f.product+' · '+f.label+' ('+f.state+')</option>'; }).join('')+
    '</select></div>'+
    '<div class="field"><label>Available (kg)</label><input id="st-kg" type="number" step="0.5" value="5"></div>'+
    '<div class="modal-foot">'+
      '<button class="btn ghost" onclick="closeModal()">Cancel</button>'+
      '<button class="btn gilt" onclick="createStock('+pointNum+')">Add</button>'+
    '</div>';
  el('modal-bg').classList.add('on');
}
function createStock(pointNum){
  var formId=el('st-form').value;
  var kg=parseFloat(el('st-kg').value)||0;
  sb.from('point_stock').insert({ store_id:STORE_ID, form_id:formId, point_number:pointNum, available_kg:kg, active:true })
    .then(function(res){
      if(res.error){ toast('Error: '+res.error.message); return; }
      toast('Stock added'); closeModal(); loadStock();
    });
}
function saveStock(formId, pointNum, val){
  var kg=parseFloat(val)||0;
  sb.from('point_stock').update({ available_kg:kg, updated_at:new Date().toISOString() })
    .eq('store_id',STORE_ID).eq('form_id',formId).eq('point_number',pointNum)
    .then(function(res){ if(res.error){ toast('Error: '+res.error.message); } else { toast('Updated'); } });
}
function delStock(formId, pointNum){
  if(!confirm('Remove this stock entry?')) return;
  sb.from('point_stock').delete().eq('store_id',STORE_ID).eq('form_id',formId).eq('point_number',pointNum)
    .then(function(res){ if(res.error){ toast('Error: '+res.error.message); return; } toast('Removed'); loadStock(); });
}

/* ---------- ORDERS ---------- */
var STATUSES=['paid','picking','picked','packed','in_delivery','at_collection','collected','cancelled','refunded'];
function renderOrders(){
  var host=el('p-orders');
  var rows=state.orders.map(function(o){
    var ptName='';
    if(o.point_number){ var pt=state.points.find(function(x){return x.number===o.point_number}); ptName=pt?pt.name:('#'+o.point_number); }
    var opts=STATUSES.map(function(s){ return '<option value="'+s+'"'+(o.status===s?' selected':'')+'>'+s+'</option>'; }).join('');
    return '<div class="order-row">'+
      '<div class="oinfo"><div class="ono">'+o.order_no+'</div>'+
      '<div class="ometa">'+(o.customer&&o.customer.name||'—')+' · '+money(o.total)+' · '+(o.fulfil_type||'')+(ptName?(' · '+ptName):'')+'</div></div>'+
      '<select class="statpill" onchange="setStatus(\''+o.id+'\',this.value)">'+opts+'</select>'+
    '</div>';
  }).join('');
  host.innerHTML='<div class="section-head"><h2>Orders</h2><button class="btn ghost sm" onclick="loadOrders()">Refresh</button></div>'+
    '<div class="card">'+(rows||'<div class="empty"><h3>No orders yet</h3></div>')+'</div>';
}
function setStatus(id,status){
  sb.from('orders').update({status:status}).eq('id',id).then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    toast('Status → '+status);
  });
}

/* ---------- SETTINGS ---------- */
function renderSettings(){
  var s=state.settings;
  el('p-settings').innerHTML='<div class="section-head"><h2>Settings</h2></div>'+
    '<div class="card">'+
      '<div class="grid2">'+
        '<div class="field"><label>Grams per person</label><input type="number" id="s-gpp" value="'+(s.grams_per_person||250)+'"></div>'+
        '<div class="field"><label>Delivery fee (SCR)</label><input type="number" id="s-fee" value="'+(s.delivery_fee||100)+'"></div>'+
      '</div>'+
      '<div class="grid2">'+
        '<div class="field"><label>Free delivery from (SCR)</label><input type="number" id="s-free" value="'+(s.free_from||3000)+'"></div>'+
        '<div class="field"><label>Tolerance ± per portion (g)</label><input type="text" id="s-tol" value="'+(s.tolerance_low||225)+'–'+(s.tolerance_high||275)+'" disabled></div>'+
      '</div>'+
      '<button class="btn gilt" style="margin-top:8px" onclick="saveSettings()">Save settings</button>'+
    '</div>'+
    '<div class="card"><h3 style="font-size:16px;margin-bottom:10px">App link</h3>'+
      '<p class="muted" style="font-size:13px;margin-bottom:8px">Customer app:</p>'+
      '<a href="https://mmysiakbiz-hash.github.io/storefront/ocean-basket-app.html" target="_blank" style="font-size:13px;word-break:break-all">mmysiakbiz-hash.github.io/storefront/ocean-basket-app.html</a>'+
    '</div>';
}
function saveSettings(){
  var merged=Object.assign({},state.settings,{
    grams_per_person:parseInt(el('s-gpp').value,10)||250,
    delivery_fee:parseFloat(el('s-fee').value)||0,
    free_from:parseFloat(el('s-free').value)||0
  });
  sb.from('stores').update({settings:merged}).eq('id',STORE_ID).then(function(res){
    if(res.error){ toast('Error: '+res.error.message); return; }
    state.settings=merged; toast('Settings saved');
  });
}

/* ---------- TOAST ---------- */
var tt;
function toast(t){ var n=el('toast'); n.textContent=t; n.classList.add('show'); clearTimeout(tt); tt=setTimeout(function(){n.classList.remove('show')},2600); }

boot();
</script>
</body>
</html>
